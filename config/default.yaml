# Orbiter Default Configuration
version: 1

# ── Bootstrap settings (required before DB connects) ──────────
# Database URL and browser profile path must be set here or in .env.
# All other settings are seeded into the `settings` DB table on first run
# and can be updated dynamically from there.

# Database Settings
database:
  url: postgresql://root:root@45.159.221.130:7777/root

# Browser Settings (bootstrap only — profile path is filesystem-dependent)
browser:
  headless: false
  defaultTimeout: 30000
  viewport:
    width: 1280
    height: 720
  profilePath: null

# LLM Settings
llm:
  provider: openrouter
  model: anthropic/claude-sonnet-4
  maxTokens: 4096
  temperature: 0.7

# Execution Settings
execution:
  maxRetries: 3
  retryDelay: 1000
  screenshotOnError: true
  screenshotOnStep: false

# Prompt Enhancement
promptEnhancer:
  enabled: true

# Loop Engine Settings
loop:
  defaultDelay:
    min: 800
    max: 1500
  maxItems: 100
  scrollPauseTime: 1000

# Recording Settings
recording:
  enabled: true
  includeScreenshots: false

# Logging Settings
logging:
  level: info
  console:
    enabled: true
    colorize: true
